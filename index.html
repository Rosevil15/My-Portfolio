<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="hero">
        <div class="hero-copy">
          <h1>
           Hello, I'm <span>ROSEVIL</span><br> I'm a Full Stack Web Developer.
          </h1>
          <div class="scroll-down">
          <a href="#projects">
           View My Projects
          <span>↓</span>
         </a>
         </div>
        </div>
      </section>

      <section id="contact" class="contact-card">
        <div class="section-heading">
          <div>
            <h2>Let�s work together</h2>
            <p>Reach out if you want a polished website, web app, or Supabase-backed project.</p>
          </div>
        </div>
        <form>
          <label>
            Name
            <input type="text" placeholder="Your name" />
          </label>
          <label>
            Email
            <input type="email" placeholder="Your email" />
          </label>
          <label>
            Message
            <textarea placeholder="What would you like to build?"></textarea>
          </label>
          <button class="btn">Send message</button>
        </form>
      </section>

      <footer>
        <p>Designed with React, Node, and Supabase in mind.</p>
      </footer>
    </div>
  </body>
</html>
